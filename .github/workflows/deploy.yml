name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Refresh question bank from the Google Sheet daily at 17:00 UTC (01:00 Taipei)
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch Google Sheet
        env:
          SHEET_ID: ${{ vars.SHEET_ID || '1usFOv65YmnxXbilHyBFTkmmKrgP_e4opfqk3vUviUOg' }}
          # Optional manual override if auto-discovery misses tabs.
          # Format: "gid1,gid2,gid3"  or  "gid1:Name1,gid2:Name2"
          SHEET_GIDS: ${{ vars.SHEET_GIDS }}
        run: npm run fetch:sheet

      - name: Build
        env:
          # GitHub Pages serves project sites at /<repo>/. Adjust if you use a custom domain.
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_SYNC_URL: ${{ secrets.SYNC_URL }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
